<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty API</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Rick and Morty API</h1>

<button id="allCharacters">Mostrar todos</button>

<div class="filters">
    <input type="text" id="name" placeholder="Nombre">
    <input type="text" id="status" placeholder="Estado">
    <input type="text" id="species" placeholder="Especie">
    <input type="text" id="type" placeholder="Tipo">
    <input type="text" id="gender" placeholder="Género">

    <button id="search">Buscar</button>
</div>

<p id="error"></p>

<table>
    <thead>
        <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Estado</th>
            <th>Especie</th>
            <th>Género</th>
        </tr>
    </thead>

    <tbody id="characters"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
